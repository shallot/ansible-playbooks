  namespace: gitlab-ci-jobs
subjects:
  - kind: ServiceAccount
    name: gitlab-agent
    namespace: gitlab-agent
roleRef:
  kind: Role
  name: gitlab-agent-job-executor
  apiGroup: rbac.authorization.k8s.io
