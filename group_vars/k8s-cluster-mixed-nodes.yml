# NB: meant only for clusters with mixed control plane and worker roles
k8s_cluster_init_mixed_control_plane_and_workers_custom_shells__to_merge:
  k8s_01_cluster_08_untaint:
    cmd: >-
      {{ kubectl_command }} taint
      nodes {{ inventory_hostname_short }}
      node-role.kubernetes.io/control-plane-
      || true
  k8s_01_cluster_09_labels:
    cmd: >-
      {{ kubectl_command }} label
      node {{ inventory_hostname_short }}
      node-role.kubernetes.io/worker=worker
