---

k8s_gitlab_config_data_dir_default:
  "{{ playbook_dir }}/files/k8s-gitlab"

k8s_gitlab_runner_custom_paths__to_merge:
  "{{ k8s_cluster_config_server_dir }}/helm/gitlab-runner.values.yaml":
    dest: "{{ k8s_cluster_config_server_dir }}/helm/gitlab-runner.values.yaml"
    state: "template"
    src: "{{ k8s_gitlab_config_data_dir }}/runner/helm.values.yaml"

gitlab_runner_k8s_helm_releases__to_merge:
  - name: "gitlab-runner"
    repo: "gitlab"
    repo_url: "https://charts.gitlab.io"
    chart: "gitlab-runner"
    namespace: "gitlab-runner"
    create_namespace: true
    values_file: "{{ k8s_cluster_config_server_dir }}/helm/gitlab-runner.values.yaml"

gitlab_runner_k8s_custom_packages__to_merge:
  python3-kubernetes: "present"
  python3-yaml: "present"

k8s_gitlab_runner_registry_auth_base64:
  "{{ (k8s_gitlab_runner_registry_username + ':' + k8s_gitlab_runner_registry_password) | b64encode }}"

k8s_gitlab_runner_docker_config:
  "{{ lookup('template', k8s_gitlab_config_data_dir + '/k8s-gitlab-registry-credentials.json') | string }}"

gitlab_runner_custom_k8s_definitions__to_merge:
  25_01_jobs_namespace:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('file', k8s_gitlab_config_data_dir + '/runner/' + '01-jobs-namespace.yaml' ) | from_yaml }}
  25_02_jobs_role_user:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('file', k8s_gitlab_config_data_dir + '/runner/' + '02-jobs-role-user.yaml' ) | from_yaml }}
  25_03_jobs_rolebinding_user:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('file', k8s_gitlab_config_data_dir + '/runner/' + '03-jobs-rolebinding-user.yaml' ) | from_yaml }}
  25_04_jobs_role_manager:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('file', k8s_gitlab_config_data_dir + '/runner/' + '04-jobs-role-manager.yaml' ) | from_yaml }}
  25_05_jobs_rolebinding_manager:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('file', k8s_gitlab_config_data_dir + '/runner/' + '05-jobs-rolebinding-manager.yaml' ) | from_yaml }}
  25_10_secret_registry:
    kubeconfig: "{{ k8s_definitions_kubeconfig | default(omit) }}"
    resource_definition: |
      {{ lookup('template', k8s_gitlab_config_data_dir + '/runner/' + '10-secret-registry.yaml' ) | from_yaml }}
